<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka nenalezena — Propilot(y)</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="any">
<meta name="theme-color" content="#102648">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
    font-family:"IBM Plex Sans",system-ui,sans-serif;color:#EAF1FA;
    background:radial-gradient(100% 120% at 50% -20%,rgba(26,86,219,.5),transparent 55%),linear-gradient(180deg,#0A1A30,#102648)}
  .mark{width:88px;height:88px;margin:0 auto 1.6rem;filter:drop-shadow(0 18px 30px rgba(0,0,0,.4))}
  .code{font-family:"IBM Plex Mono",monospace;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:#EDB458}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(2rem,6vw,3rem);margin:.6rem 0 0;letter-spacing:-.02em}
  p{color:#A6B9D4;margin:1rem auto 0;max-width:42ch;line-height:1.6}
  a{display:inline-flex;margin-top:2rem;background:#EDB458;color:#0A1A30;font-weight:600;text-decoration:none;
    padding:.85em 1.4em;border-radius:11px;transition:.18s}
  a:hover{background:#F6D79B;transform:translateY(-2px)}
</style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="47" fill="#fff"/>
      <clipPath id="c"><circle cx="50" cy="50" r="40"/></clipPath>
      <g clip-path="url(#c)"><rect x="10" y="10" width="80" height="40" fill="#CADBEA"/><rect x="10" y="50" width="80" height="40" fill="#E0922F"/></g>
      <polygon points="50,14 45.5,22 54.5,22" fill="#fff"/>
      <g fill="#102648"><rect x="26" y="47" width="14" height="6" rx="3"/><circle cx="50" cy="50" r="4.4"/><rect x="60" y="47" width="14" height="6" rx="3"/></g>
    </svg>
    <div class="code">Error 404 · Mimo kurz</div>
    <h1>Tahle stránka neexistuje.</h1>
    <p>Možná jsi mimo trasu. Vrať se na palubu a pokračuj v přípravě.</p>
    <a href="/">Zpět na hlavní stránku</a>
  </main>
</body>
</html>
